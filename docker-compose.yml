services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped

  whatsapp:
    build: ./whatsapp-service
    ports:
      - "3001:3001"
    env_file: whatsapp-service/.env
    volumes:
      - whatsapp_session:/app/.wwebjs_auth
    restart: unless-stopped

  frontend:
    image: node:20-slim
    working_dir: /app
    command: sh -c "npm ci && npm run build && npm start"
    ports:
      - "3000:3000"
    env_file: frontend/.env.local
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  whatsapp_session:
