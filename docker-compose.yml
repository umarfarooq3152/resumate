services:
  api:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_API_URL: ""
    ports:
      - "3000:3000"
    environment:
      # Server-side proxy: frontend container → api container on same Docker network
      API_URL: http://api:8080
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  whatsapp:
    build: ./whatsapp-service
    ports:
      - "3001:3001"
    env_file: whatsapp-service/.env
    volumes:
      - whatsapp_session:/app/.wwebjs_auth
    restart: unless-stopped
    profiles:
      - whatsapp

volumes:
  whatsapp_session:
